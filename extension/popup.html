<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TabMind</title>
  <style>
    *{ box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      background: #0C0C0F;
      color: #E0E0E8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #1E1E28;
    }
    .logo { display: flex; align-items: center; gap: 6px; }
    .logo-icon { font-size: 16px; }
    .logo-text { font-weight: 600; font-size: 14px; color: #fff; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-email { font-size: 11px; color: #555; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sign-out-btn {
      font-size: 11px; color: #555; background: none;
      border: none; cursor: pointer; padding: 2px 6px;
      border-radius: 4px;
    }
    .sign-out-btn:hover { color: #ef4444; background: #1a0a0a; }

    /* Auth screen */
    .auth-screen {
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .auth-screen .title { font-size: 15px; font-weight: 600; color: #fff; }
    .auth-screen .sub { font-size: 12px; color: #555; line-height: 1.5; }
    .open-app-btn {
      width: 100%;
      padding: 10px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .open-app-btn:hover { background: #e5e5e5; }

    /* Tab list */
    .tabs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }
    .tabs-count { font-size: 12px; color: #555; }

    .save-btn {
      padding: 7px 14px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .save-btn:hover { background: #4f46e5; }
    .save-btn:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; }

    .tab-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 0 8px 8px;
    }
    .tab-list::-webkit-scrollbar { width: 4px; }
    .tab-list::-webkit-scrollbar-track { background: transparent; }
    .tab-list::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
      transition: background 0.1s;
    }
    .tab-item:hover { background: #16161E; }

    .tab-favicon {
      width: 20px; height: 20px;
      border-radius: 4px;
      background: #1e1e28;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 11px;
      overflow: hidden;
    }
    .tab-favicon img { width: 14px; height: 14px; }

    .tab-info { flex: 1; min-width: 0; }
    .tab-title {
      font-size: 12px; color: #ccc;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab-url {
      font-size: 11px; color: #444;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 1px;
    }

    .tab-status {
      font-size: 11px;
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }
    .status-pending { color: #333; }
    .status-saving { color: #6366f1; }
    .status-done { color: #22c55e; }
    .status-duplicate { color: #f59e0b; }
    .status-error { color: #ef4444; }

    /* Progress bar */
    .progress-bar-wrap {
      padding: 0 16px 12px;
      display: none;
    }
    .progress-bar-wrap.visible { display: block; }
    .progress-bar-bg {
      height: 3px; background: #1e1e28; border-radius: 999px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: #6366f1;
      border-radius: 999px; transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 11px; color: #555;
      margin-top: 5px; text-align: right;
    }

    /* Footer */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1E1E28;
      display: flex;
      justify-content: center;
    }
    .open-dashboard {
      width: 100%;
      font-size: 11px; color: #555;
      text-decoration: none;
      text-align: center;
      transition: color 0.15s;
    }
    .open-dashboard:hover { color: #fff; }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="popup.js"></script>
</body>
</html>
